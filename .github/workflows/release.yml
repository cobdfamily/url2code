name: release

# Builds and pushes a container image to the kibble registry on every
# git tag matching v*. The image is tagged twice: with the version
# (v1.0.0 -> 1.0.0) and as `latest`. Deploy hosts pull from
# kibble.apps.blindhub.ca/cobdfamily/url2code:<version>.
#
# The kibble registry is anonymous-push for the cobdfamily/* path
# and speaks plain HTTP, so no login step is needed and buildkit is
# configured to talk plain HTTP to it.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (eg. v1.0.0)"
        required: true

env:
  REGISTRY: kibble.apps.blindhub.ca
  IMAGE: cobdfamily/url2code

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: derive version (strip leading v)
        id: ver
        run: |
          ref="${{ inputs.tag || github.ref_name }}"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: set up buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."kibble.apps.blindhub.ca"]
              http = true
              insecure = true

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: summary
        run: |
          {
            echo "### Pushed"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.ver.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
