name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { version: latest, enable-cache: true }
      - run: uv python install 3.12
      - run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check src tests

  pytest:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true

      - name: pin python
        run: uv python install 3.12

      - name: sync deps (incl. dev)
        run: uv sync --frozen

      - name: run pytest with coverage
        run: uv run pytest -q --cov --cov-report=term --cov-report=xml

      - name: upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
