api:
  title: URL2Code CLI API
  version: 0.1.0
  default_root: /

logging:
  level: INFO

endpoints:
  - name: audfprint-match
    description: Match audio against an audfprint database.
    route: /match
    root: /audfprint
    method: POST
    defaults:
      db_path: /data/audfprint/db.pklz
      query_file: /data/input.wav
    command:
      executable: audfprint
      args:
        - match
        - "{query_file}"
      timeout_seconds: 60
    request:
      validations:
        query_file:
          type: text
      flags:
        - name: db_path
          flag: --dbase
          valuePrefix: ""
          type: text
    output:
      mode: regex_json
      regex:
        pattern: "(?P<track>.+)\\s+matched\\s+(?P<score>\\d+)\\s+times"

  - name: file2braille-translate
    description: Convert a file using file2braille.
    route: /translate
    root: /file2braille
    method: POST
    defaults:
      table: en-us-g2.ctb
    command:
      executable: file2braille
      args:
        - --table
        - "{table}"
        - "{input_file}"
        - "{output_file}"
      timeout_seconds: 60
    request:
      flags:
        - name: table
          flag: --table
          valuePrefix: ""
          type: enum
          choices:
            - en-us-g2.ctb
            - en-us-g1.ctb
    uploads:
      - field_name: input_file
        placeholder: input_file
        temp_dir: /tmp/url2code/uploads/file2braille
    output_files:
      - placeholder: output_file
        filename_placeholder: output_filename
        output_dir: /tmp/url2code/outputs/file2braille
        suffix: .brf
        prefix: file2braille-
    output:
      mode: text

  - name: dog-walk
    description: Example showing request-time argument override.
    route: /walk
    root: /dogs
    method: POST
    defaults:
      action: walk
    command:
      executable: dog
      args:
        - "{action}"
    request:
      validations:
        action:
          type: enum
          choices:
            - walk
            - jump
            - run
      flags:
        - name: speed
          flag: --speed
          valuePrefix: ""
          type: text
    output:
      mode: text
